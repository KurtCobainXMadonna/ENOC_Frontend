sonar.projectKey=zwing-frontend
sonar.projectName=Zwing Frontend
sonar.projectVersion=1.0

# Source directories
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/coverage/**

# Test directories
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage report (generado por Vitest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Language
sonar.language=ts
sonar.sourceEncoding=UTF-8

# TypeScript/JavaScript
sonar.typescript.tsconfigPath=tsconfig.app.json